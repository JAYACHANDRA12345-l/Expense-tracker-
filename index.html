<!DOCTYPE html>
<html>
<head>
<title>Expense Tracker</title>

<style>
body {
font-family: Arial;
background: url('https://th.bing.com/th/id/OIP.El6yCvVSRvFg6CmBve2sOAHaEo?w=261&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3') no-repeat center center fixed;
background-size: cover;
color: white;
padding: 20px;
}

input,select,button {
padding:10px;
margin:5px;
border-radius:5px;
border:none;
}

button {
background:#ff6b6b;
color:white;
}

table {
background: rgba(255,255,255,0.9);
color: black;
width: 100%;
margin-top: 20px;
border-radius: 10px;
}

td,th {
padding:10px;
}

a {
color:yellow;
}
</style>

</head>

<body>

<h1>Expense Tracker</h1>

<h3>Total: ₹{{total}}</h3>

<form method="POST" action="/add">

<input name="description" placeholder="Description" required>

<input name="amount" type="number" step="0.01" placeholder="Amount" required>

<select name="category">
<option>Food</option>
<option>Transport</option>
<option>Shopping</option>
<option>Entertainment</option>
<option>Other</option>
</select>

<button type="submit">Add</button>

</form>

<br>

<a href="/chart"><button>View Chart</button></a>
<a href="/predict"><button>Predict Future Expense</button></a>

<table border="1">

<tr>
<th>Description</th>
<th>Amount</th>
<th>Category</th>
<th>Date</th>
<th>Delete</th>
</tr>

{% for e in expenses %}

<tr>
<td>{{e.description}}</td>
<td>{{e.amount}}</td>
<td>{{e.category}}</td>
<td>{{e.date.strftime('%Y-%m-%d')}}</td>
<td><a href="/delete/{{e.id}}">Delete</a></td>
</tr>

{% endfor %}

</table>

{% if chart %}
<h2>Chart</h2>
<img src="/static/chart.png">
{% endif %}

{% if prediction %}
<h2>{{prediction}}</h2>
{% endif %}

</body>
</html>
